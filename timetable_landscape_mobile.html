<!DOCTYPE html>
<html>
<head>
    <title>Prayer Timetable</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        
        .big-green-btn {
            background-color: #0a7d45;
            color: white;
            padding: 18px 28px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            display: block;
            margin: 20px auto;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.2s ease;
        }

        .big-green-btn:hover {
            background-color: #0c8f4f;
            transform: scale(1.03);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
            font-size: 18px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #0a7d45;
            color: white;
        }

        .header {
            text-align: center;
            margin-top: 20px;
        }

        .jummah-note {
            margin-top: 5px;
            font-size: 14px;
            color: #444;
        }
        .stacked-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 25px;
    font-size: 18px;
}

.stacked-table th,
.stacked-table td {
    border: 1px solid #ccc;
    padding: 10px;
    text-align: center;
}

.begin-col {
    background: #0a7d45;
    color: white;
}

.jamat-col {
    background: #0c8f4f;
    color: white;
}

.stacked-table th {
    background: #0a7d45;
    color: white;
}

.spacer-row td {
    border: none;
    height: 10px;
}

/* Mobile stacking */
@media (max-width: 600px) {
    .stacked-table {
        font-size: 16px;
    }
    .stacked-table td, .stacked-table th {
        padding: 8px;
    }
}

    </style>
</head>

<body>

<button id="printTimetable" class="big-green-btn">
    Show Full Month Timetable
</button>

<div id="timetableContainer"></div>

<script>
async function fetchSheet() {
    const url = "https://opensheet.vercel.app/10uilaYxTqZutr5xmKKeInZggg_zgcRvuTKG0UULmxb4/Sheet1";
    const res = await fetch(url);
    const data = await res.json();

    const now = new Date();
    const currentMonth = now.getMonth() + 1; // 1–12

    // Filter by current month (DD-MM-YYYY)
    const filtered = data.filter(row => {
        if (!row.DATE) return false;
        const parts = row.DATE.split("-");
        if (parts.length !== 3) return false;
        const monthFromSheet = parseInt(parts[1], 10);
        return monthFromSheet === currentMonth;
    });

    return filtered;
}

function generateTableHTML(data) {
    let html = `
    <div class="header">
        <h1>Leeds Afghan Education Centre</h1>
        <h2>Prayer Timetable</h2>
        <div class="jummah-note">FRIDAY (JUM’AH) PRAYER TIME WILL BE THE SAME AS THE ZUHR PRAYER TIME</div>
    </div>

    <table class="stacked-table">
        <tr>
            <th class="begin-col" colspan="2">Beginning</th>
            <th class="jamat-col" colspan="2">Jamat Times</th>
        </tr>
        <tr>
            <th>Prayer</th>
            <th>Time</th>
            <th>Prayer</th>
            <th>Jamat</th>
        </tr>
    `;

    data.forEach(row => {
        html += `
        <tr><td>Date</td><td>${row.DATE}</td><td></td><td></td></tr>

        <tr><td>Fajr</td><td>${row.FAJR}</td><td>Fajr Jamat</td><td>${row["FAJR JAMAT"]}</td></tr>

        <tr><td>Zuhr</td><td>${row.ZUHR}</td><td>Zuhr Jamat</td><td>${row["ZUHR JAMAT"]}</td></tr>

        <tr><td>Asr</td><td>${row.ASR}</td><td>Asr Jamat</td><td>${row["ASR JAMAT"]}</td></tr>

        <tr><td>Maghrib</td><td>${row.MAGHRIB}</td><td></td><td></td></tr>

        <tr><td>Isha</td><td>${row.ISHA}</td><td>Isha Jamat</td><td>${row["ISHA JAMAT"]}</td></tr>

        <tr class="spacer-row"><td colspan="4"></td></tr>
        `;
    });

    html += `</table>`;
    return html;
}


document.getElementById("printTimetable").addEventListener("click", async () => {
    const filteredData = await fetchSheet();
    const html = generateTableHTML(filteredData);
    document.getElementById("timetableContainer").innerHTML = html;
});
</script>

</body>
</html>
