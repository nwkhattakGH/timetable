<!DOCTYPE html>
<html>
<head>
    <title>Prayer Timetable</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        
        .big-green-btn {
    background-color: #0a7d45;
    color: white;
    padding: 10px 15px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 6px;
    width: 100%;
    display: block;
    margin: 10px 0;
    cursor: pointer;
    text-align: center;
}


        .big-green-btn:hover {
            background-color: #0c8f4f;
            transform: scale(1.03);
        }

        .fullmonth-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
            font-size: 18px;
        }

        .fullmonth-table th,
        .fullmonth-table td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        .begin-head {
            background: #0a7d45;
            color: white;
            font-size: 20px;
        }

        .jamat-head {
            background: #0c8f4f;
            color: white;
            font-size: 20px;
        }

       .fullmonth-table th {
    background: #eaeaea;
    font-weight: bold;
    color: black;
}


        .header {
            text-align: center;
            margin-top: 20px;
        }

        .jummah-note {
            margin-top: 5px;
            font-size: 14px;
            color: #444;
        }

        /* Mobile responsive */
        @media (max-width: 600px) {
            .fullmonth-table {
                font-size: 14px;
            }
            .fullmonth-table th,
            .fullmonth-table td {
                padding: 6px;
            }
        }
.table-wrapper {
    width: 100%;
    overflow-x: auto;
    margin: 0 auto;
    padding: 0 5px; /* equal spacing on both sides */
}

.fullmonth-table {
    width: 100%;
    min-width: 650px; /* prevents squashing */
}

        
    </style>
</head>

<body>

<button id="printTimetable" class="big-green-btn">
    Show Full Month Timetable
</button>

<div id="timetableContainer"></div>

<script>
async function fetchSheet() {
    const url = "https://opensheet.vercel.app/10uilaYxTqZutr5xmKKeInZggg_zgcRvuTKG0UULmxb4/Sheet1";
    const res = await fetch(url);
    const data = await res.json();

    const now = new Date();
    const currentMonth = now.getMonth() + 1; // 1–12

    // Filter by current month (DD-MM-YYYY)
    const filtered = data.filter(row => {
        if (!row.DATE) return false;
        const parts = row.DATE.split("-");
        if (parts.length !== 3) return false;
        const monthFromSheet = parseInt(parts[1], 10);
        return monthFromSheet === currentMonth;
    });

    return filtered;
}

function generateTableHTML(data) {
    let html = `
    <div class="header">
        <h1>Leeds Afghan Education Centre</h1>
        <h2>Prayer Timetable</h2>
        <div class="jummah-note">FRIDAY (JUM’AH) PRAYER TIME WILL BE THE SAME AS THE ZUHR PRAYER TIME</div>
    </div>

    <table class="fullmonth-table">

        <tr>
            <th colspan="7" class="begin-head">Beginning Time</th>
            <th colspan="4" class="jamat-head">Jama’ah Time</th>
        </tr>

        <tr>
            <th>Date</th>
            <th>Fajr</th>
            <th>Sunrise</th>
            <th>Zuhr</th>
            <th>Asr</th>
            <th>Maghrib</th>
            <th>Isha</th>

            <th>Fajr Jamat</th>
            <th>Zuhr Jamat</th>
            <th>Asr Jamat</th>
            <th>Isha Jamat</th>
        </tr>
    `;

    data.forEach(row => {
        html += `
        <tr>
            <td>${row.DATE}</td>
            <td>${row.FAJR}</td>
            <td>${row.SUNRISE}</td>
            <td>${row.ZUHR}</td>
            <td>${row.ASR}</td>
            <td>${row.MAGHRIB}</td>
            <td>${row.ISHA}</td>

            <td>${row["FAJR JAMAT"]}</td>
            <td>${row["ZUHR JAMAT"]}</td>
            <td>${row["ASR JAMAT"]}</td>
            <td>${row["ISHA JAMAT"]}</td>
        </tr>
        `;
    });

    html += `</table>`;
    return html;
}

document.getElementById("printTimetable").addEventListener("click", async () => {
    const filteredData = await fetchSheet();
    const html = generateTableHTML(filteredData);
    document.getElementById("timetableContainer").innerHTML =
    `<div class="table-wrapper">` + html + `</div>`;

});
</script>

</body>
</html>
