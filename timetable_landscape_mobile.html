<!DOCTYPE html>
<html>
<head>
    <title>Prayer Timetable</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .big-green-btn {
            background-color: #138275;
            color: white;
            padding: 10px 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            width: 50%;
            display: block;
            margin: 10px auto;
            cursor: pointer;
            text-align: center;
        }

        .big-green-btn:hover {
            background-color: #0c8f4f;
            transform: scale(1.03);
        }

        .fullmonth-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
            font-size: 18px;
        }

        .fullmonth-table th,
        .fullmonth-table td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        /* ⭐ Beginning Time (Light Gold) */
        .begin-head {
            background: #fff4d6;   /* light gold */
            color: black;
            font-size: 20px;
        }

        .begin-col {
            background: #fff4d6;   /* same light gold */
            color: black;
            font-weight: bold;
        }

        /* ⭐ Jama'ah Time (Green + White) */
        .jamat-head {
            background: #0c8f4f;
            color: white;
            font-size: 20px;
        }

        .jamat-col {
            background: #0c8f4f;
            color: white;
            font-weight: bold;
        }

        .fullmonth-table th {
            background: #eaeaea;
            font-weight: bold;
            color: black;
        }

        .header {
            text-align: center;
            margin-top: 20px;
            background: #fff4d6;   /* Light Gold */
            padding: 15px;
            border-radius: 6px;
        }

        .jummah-note {
            margin-top: 5px;
            font-size: 14px;
            color: #444;
            font-weight: bold; /* bold as requested */
        }

        .table-footer {
            background: #fff4d6;
            color: black;
            padding: 15px;
            margin-top: 20px;
            text-align: center;
            font-size: 16px;
            line-height: 1.5;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<button id="printTimetable" class="big-green-btn">
    Show Full Month Timetable
</button>

<div id="timetableContainer"></div>

<script>
async function fetchSheet() {
    const url = "https://opensheet.vercel.app/10uilaYxTqZutr5xmKKeInZggg_zgcRvuTKG0UULmxb4/Sheet1";
    const res = await fetch(url);
    const data = await res.json();

    const now = new Date();
    const currentMonth = now.getMonth() + 1;

    const filtered = data.filter(row => {
        if (!row.DATE) return false;
        const parts = row.DATE.split("-");
        if (parts.length !== 3) return false;
        const monthFromSheet = parseInt(parts[1], 10);
        return monthFromSheet === currentMonth;
    });

    return filtered;
}

function generateTableHTML(data) {
    let html = `
    <div class="header">
        <h1>Leeds Afghan Education Centre</h1>
        <h2>Prayer Timetable</h2>
        <div class="jummah-note">FRIDAY (JUM’AH) PRAYER TIME WILL BE THE SAME AS THE ZUHR PRAYER TIME</div>
    </div>

    <table class="fullmonth-table">

        <tr>
            <th colspan="7" class="begin-head">Beginning Time</th>
            <th colspan="4" class="jamat-head">Jama’ah Time</th>
        </tr>

        <tr>
            <th class="begin-col">Date</th>
            <th class="begin-col">Fajr</th>
            <th class="begin-col">Sunrise</th>
            <th class="begin-col">Zuhr</th>
            <th class="begin-col">Asr</th>
            <th class="begin-col">Maghrib</th>
            <th class="begin-col">Isha</th>

            <th class="jamat-col">Fajr Jamat</th>
            <th class="jamat-col">Zuhr Jamat</th>
            <th class="jamat-col">Asr Jamat</th>
            <th class="jamat-col">Isha Jamat</th>
        </tr>
    `;

    data.forEach(row => {
        html += `
        <tr>
            <td>${row.DATE}</td>
            <td>${row.FAJR}</td>
            <td>${row.SUNRISE}</td>
            <td>${row.ZUHR}</td>
            <td>${row.ASR}</td>
            <td>${row.MAGHRIB}</td>
            <td>${row.ISHA}</td>

            <td>${row["FAJR JAMAT"]}</td>
            <td>${row["ZUHR JAMAT"]}</td>
            <td>${row["ASR JAMAT"]}</td>
            <td>${row["ISHA JAMAT"]}</td>
        </tr>
        `;
    });

    html += `</table>`;

    html += `
    <div class="table-footer">
        PLEASE CONSIDER SETTING UP A STANDING ORDER TO SUPPORT THE DAILY RUNNING OF OUR EDUCATION CENTRE<br>
        DONATIONS CAN BE MADE TO: LEEDS AFGHAN EDUCATION CENTRE — ACC: 33737738 — SC: 56-00-54<br>
        ADDRESS: 1-3 SANDHURST AVENUE, LEEDS, LS8 3QT — CHARITY NO: 1128184
    </div>
    `;

    return html;
}

function openPrintFriendly(html) {
    const newTab = window.open("", "_blank");
    newTab.document.write(`
        <html>
        <head>
            <title>Print Friendly Timetable</title>
            <style>
                body { font-family: Arial, sans-serif; padding: 20px; }
                table { width: 100%; border-collapse: collapse; font-size: 18px; }
                th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
                th { background: #eaeaea; }

                .begin-head { background: #fff4d6; color: black; }
                .begin-col { background: #fff4d6; color: black; font-weight: bold; }

                .jamat-head { background: #0c8f4f; color: white; }
                .jamat-col { background: #0c8f4f; color: white; font-weight: bold; }

                .header {
                    text-align: center;
                    margin-bottom: 20px;
                    background: #fff4d6;   /* Light Gold */
                    padding: 15px;
                    border-radius: 6px;
                }


                .table-footer {
    margin-top: 25px;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
    line-height: 1.6;
    background: #fff4d6;   /* Light Gold */
    padding: 15px;
    border: 1px solid #ccc;
    border-radius: 6px;
}


                .jummah-note { font-weight: bold; }
            </style>
        </head>
        <body>
            ${html}
        </body>
        </html>
    `);
    newTab.document.close();
}

document.getElementById("printTimetable").addEventListener("click", async () => {
    const filteredData = await fetchSheet();
    const html = generateTableHTML(filteredData);

    openPrintFriendly(html);

    document.getElementById("timetableContainer").innerHTML = "";
});
</script>

</body>
</html>
