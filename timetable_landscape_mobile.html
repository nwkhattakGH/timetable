<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Print Monthly Timetable</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 40px;
}

/* Mobile-friendly button */
#printTimetable {
    padding: 14px 22px;
    background: #0a5;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    max-width: 350px;
}

/* Mobile responsiveness */
@media (max-width: 600px) {
    #printTimetable {
        font-size: 20px;
        padding: 16px;
        width: 90%;
    }
}
</style>

</head>
<body>

<button id="printTimetable">🖨️ Print Monthly Timetable</button>

<script>
// Fetch Google Sheet via OpenSheet
async function fetchMonthData() {
    const url = "https://opensheet.elk.sh/10uilaYxTqZutr5xmKKeInZggg_zgcRvuTKG0UULmxb4/Sheet1";
    const res = await fetch(url);
    const data = await res.json();

    const now = new Date();
    const month = now.getMonth() + 1;

    return data.filter(row => Number(row.month) === month);
}

// Build monthly table HTML
function generateMonthlyTableHTML(data) {
    let html = `
    <div style="overflow-x:auto;">
    <table style="min-width:900px;">
        <tr>
            <th>Date</th>
            <th>Fajr</th>
            <th>Sunrise</th>
            <th>Zuhr</th>
            <th>Asr</th>
            <th>Maghrib</th>
            <th>Isha</th>
        </tr>
    `;

    data.forEach(row => {
        html += `
        <tr>
            <td>${row.date}</td>
            <td>${row.fajr}</td>
            <td>${row.sunrise}</td>
            <td>${row.zuhr}</td>
            <td>${row.asr}</td>
            <td>${row.maghrib}</td>
            <td>${row.isha}</td>
        </tr>`;
    });

    html += "</table></div>";
    return html;
}

// Print handler
document.getElementById("printTimetable").addEventListener("click", async () => {

    // OPEN POPUP FIRST (fixes GitHub Pages popup blocking)
    const printWindow = window.open("", "_blank");

    // THEN fetch data
    const monthData = await fetchMonthData();

    const now = new Date();
    const currentMonthName = now.toLocaleString("en-GB", { month: "long" });
    const currentYear = now.getFullYear();

    printWindow.document.write(`
<html>
<head>
<title>Monthly Prayer Timetable</title>

<style>
@page { size: A4 landscape; }

body { 
    font-family: Arial, sans-serif; 
    padding: 30px; 
    color: #1a1a1a; 
    background: white; 
}

.header { text-align: center; margin-bottom: 20px; }
.logo { width: 160px; margin-bottom: 10px; }

h1 { font-size: 32px; margin: 0; color: #0a5; }
h2 { font-size: 22px; margin-top: 5px; color: #0a5; }

.jummah-note { 
    text-align: center; 
    font-size: 17px; 
    margin-top: 5px; 
    color: #0a5; 
    font-weight: bold; 
}

table { 
    width: 100%; 
    border-collapse: collapse; 
    margin-top: 25px; 
    font-size: 16px; 
}

th { 
    background: #0a5; 
    color: white; 
    padding: 12px; 
    border: 1px solid #0a5; 
}

td { 
    padding: 10px; 
    border: 1px solid #ccc; 
    text-align: center; 
}

.footer { 
    margin-top: 35px; 
    text-align: center; 
    font-size: 16px; 
    line-height: 1.6; 
    color: #0a5; 
}

.donate { 
    margin-top: 10px; 
    font-weight: bold; 
    color: #b30000; 
    font-size: 17px; 
}
</style>

</head>
<body>

<div class="header">
    <img class="logo" src="https://drive.google.com/uc?export=view&id=15v9rvTdhoFcDF3ZErfXxYB_RBqcFk7oQ" />
    <h1>Leeds Afghan Education Centre</h1>
    <h2>Monthly Prayer Timetable – ${currentMonthName} ${currentYear}</h2>
    <div class="jummah-note">FRIDAY (JUM’AH) PRAYER TIME WILL BE THE SAME AS THE ZUHR PRAYER TIME</div>
</div>

${generateMonthlyTableHTML(monthData)}

<div class="footer">
    1-3 SANDHURST AVENUE, HAREHILLS, LS8 3QT, LEEDS<br>
    CHARITY NUMBER: 1128184<br>
    <div class="donate">SUPPORT YOUR MASJID PLEASE</div>
    BANK: NATWEST | ACC NUM: 33737738 | SORT CODE: 56-00-54
</div>

</body>
</html>
    `);

    printWindow.document.close();
    printWindow.focus();
    printWindow.print();
});
</script>


</body>
</html>
